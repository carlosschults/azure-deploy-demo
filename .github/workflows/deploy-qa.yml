name: Deploy to QA

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to QA
    runs-on: ubuntu-latest
    environment: QA

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate timestamp tag
        id: tags
        run: |
          DATE=$(date +'%Y%m%d')
          RUN=${{ github.run_number }}
          echo "timestamp=${DATE}.build${RUN}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Fetch dev image and resolve digest
        id: image
        run: |
          docker pull carlosschults/azuredemo:dev-latest
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' carlosschults/azuredemo:dev-latest)
          echo "ref=${DIGEST}" >> $GITHUB_OUTPUT

      - name: Deploy to Azure App Service (QA)
        uses: azure/webapps-deploy@v3
        with:
          app-name: AzureDemo-QA
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_QA }}
          images: ${{ steps.image.outputs.ref }}

      - name: Apply qa-latest rolling tag
        run: |
          docker tag carlosschults/azuredemo:dev-latest carlosschults/azuredemo:qa-latest
          docker push carlosschults/azuredemo:qa-latest

      - name: Create Git tag
        run: |
          TAG="qa-${{ steps.tags.outputs.timestamp }}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag $TAG
          git push origin $TAG
